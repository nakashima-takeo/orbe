# Orbe キュレート既定。後に読む ~/.config/ghostty が後勝ちで上書きする。
theme = light:OrbeLight,dark:OrbeDark
font-size = 12
# 本文等幅チェーン。プライマリは JetBrains Mono（4スタイル同梱・bold/italic も設計字形で解決）、
# 末尾に広カバレッジの JuliaMono を fallback として据える。font-family の各行は fallback=false の
# プライマリ face として埋め込み JetBrains より前に挿入され、JuliaMono が最後に照会されるため、
# JetBrains に無い記号（⎇▰▱ 等）が ghostty のフォント解決最終段 discovery（起動文脈・LANG 依存で
# 不安定）に落ちる前に決定論的に確定する。TTF は起動時に .process 登録済み（TerminalFonts.registerBundled）。
font-family = JetBrainsMono Nerd Font
font-family = JuliaMono
# 画面の不透明度（背景の透過）。設定パレットの既定 95% と対称。生成 gui.conf が後勝ちで上書きする。
background-opacity = 0.95
# 背景ブラー（すりガラス）。設定パレットの既定 true と対称。opacity<1 のとき libghostty が CGS ブラーを掛ける。生成 gui.conf が後勝ちで上書きする。
background-blur = true
# 日本語コードポイントを Hiragino Sans W3（レギュラー）に固定する。未指定だと CJK フォールバックが
# CTFontCreateForString 経由でプロセスの優先言語に依存し、起動文脈次第で簡体字フォントが
# 選ばれて仮名・漢字が中華字形になる。codepoint-map は解決順の最上位で名前解決するため、
# 起動が open か直接 exec か・LANG が何かに関わらず決定論的に日本語字形で描く（プライマリ等幅には不干渉）。
# ウェイトは W3 を明示する。ファミリ名だけ（"Hiragino Sans"）だと W0〜W9 が全マッチし極細の W0 が選ばれる。
font-codepoint-map = U+3000-U+303F,U+3040-U+309F,U+30A0-U+30FF,U+3400-U+4DBF,U+4E00-U+9FFF,U+F900-U+FAFF,U+FF00-U+FFEF=Hiragino Sans W3
# emoji の font-codepoint-map は生成 gui.conf（emoji-font 設定・常時 emit・後勝ち）が単一出所として持つ。
window-padding-x = 8
window-padding-y = 8
cursor-style = block
# カーソルの点滅 ON（Orbe 既定）。カーソル色はテーマ側 cursor-color が単一の出所。
# 点滅周期は Ghostty ハードコードの標準 600ms（chrome の blink 1.1s とは異なる。docs/design-system.md §8 参照）。
cursor-style-blink = true
# shell-integration がカーソルを上書きするのと、precmd/preexec で OSC 2 タイトル（cwd/コマンド名）を
# 送るのを止める。タブ名は Orbe が 3 層 precedence で解決する（アプリ自前の OSC 2 は影響を受けない）。
shell-integration-features = no-cursor,no-title
